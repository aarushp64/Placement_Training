<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input</title>
</head>
<body>
    <center> 
        <form>  
    <h1>Login Form</h1>
    Name: <input placeholder = "Enter Name" type="text"><br><br>
    Email: <input placeholder = "Enter Email" type="email"><br><br>
    Mobile No.: <input placeholder = "Enter Mobile Number" type="tel"><br><br>
    Password: <input placeholder = "Enter Password" type="password"> <br><br>
    <button type="submit">Submit</button><hr>
        </form>
    </center>

<h2>Some more input types</h2>
What is your gender?
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female<br><br>
What are your Age?   
<input type="number" placeholder="Enter Age"><hr>

<h2>Check box</h2>
Selecet the Languages you know:
<input type="checkbox" > Python
<input type="checkbox" > C++
<input type="checkbox" > HTML
<input type="checkbox" > Java
<input type="checkbox" > JavaScript<br><br>

<h2>Select your City</h2>
<select>
    <option value="Delhi">Delhi</option>
    <option value="Mumbai">Mumbai</option>
    <option value="Bangalore">Bangalore</option>
    <option value="Chennai">Chennai</option>
    <option value="Kolkata">Kolkata</option>
</select>
<p>In case of any other city: <input type="text" placeholder="Enter City Name"></p><hr>



</body>
</html>
