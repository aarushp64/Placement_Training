<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
    .top-navbar {
      display: flex;                  /* Activates flexbox layout */
      justify-content: space-between; /* Creates equal spacing between items */
      align-items: center;            /* Vertically centers the icons */
      padding: 20px 40px;            /* Adds padding at top/bottom and sides */
      width: 100%;                    /* Spans the full width of the screen */
      box-sizing: border-box;         /* Prevents horizontal scrolling issues */
    }

    .top-navbar a {
      text-decoration: none; 
    }
    </style>

</head>
<body>
  <div class="top-navbar">
    <a href="https://youtube.com" target="_blank">
      <i class="fa fa-youtube" style="font-size:30px;color:red;"></i>
    </a>
  </a>
  
  <a href="https://facebook.com" target="_blank">
    <i class="fa fa-facebook" style="font-size:30px;color:rgb(0, 0, 255);"></i>
  </a>
  
  <a href="https://google.com" target="_blank">
    <i class="fa fa-google" style="font-size:30px;color:rgb(8, 9, 8);"></i>
  </a>
  
  <a href="https://linkedin.com" target="_blank">
    <i class="fa fa-linkedin" style="font-size:30px;color:rgb(0, 0, 255);"></i>
  </a>
  
  <a href="https://whatsapp.com" target="_blank">
    <i class="fa fa-whatsapp" style="font-size:30px;color:rgb(26, 255, 0)"></i>
  </a>
  
  <a href="https://twitter.com" target="_blank">
    <i class="fa fa-twitter" style="font-size:30px;color:rgb(16, 111, 174);"></i>
  </a>
  
  <a href="https://instagram.com" target="_blank">
    <i class="fa fa-instagram" style="font-size:30px;color:rgb(217, 53, 165);"></i>
  </a>

  <a href="https://github.com" target="_blank">
    <i class="fa fa-github" style="font-size:30px;color:rgb(0, 0, 0);"></i>
  </a>

    </div>

</body>

</html>
