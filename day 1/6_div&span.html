<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background: darkkhaki;
            height: 100px;
            width: 25%;
        }
        span{
            background: lightpink;
            height: 100px;
           
        }
        h1{
            background: lightgray;
            margin-left: 30px;
            margin-top: 10px;
            margin-right: 62px;
        }
        h3{
            background: yellow;
            padding-left: 90px;
            margin-left: 40px;
            padding-top: 50px;
            border: 12px dashed red;
            transition: 3s;
            
        }
        h3:hover{
            background: black;
            color: whitesmoke;
            font-size: 30px;
            border-radius: 20px;
            cursor : none;
        }
        
    </style>
</head>
<body>
    <div> I am a Div </div>
    <span> Span Demo </span>
    <h1> I will Show Margin </h1>
    <h3> I will be demo for padding</h3>
</body>
</html>
