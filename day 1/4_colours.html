<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour</title>
</head>
<body>
    <h1 style="color:blue; text-align: center; font-family:Cursive;">Blue</h1>
    <h1 style="color:red; text-align: center; font-family: Arial, sans-serif;">Red</h1>
    <h1 style="color:green; text-align: center; font-family: Georgia, serif;">Green</h1>
    <style>
        body {
            background-color: rgb(0, 0, 0);
            text-align: center;
            color: white;
            font-family: 'Times New Roman', Times, serif;
        }
        #a{
            color: yellow;
            font-family:Cursive;
        }
        .b{
            color: brown;
        }
    </style>
    <h1>White</h1>
    <h1 id="a">Yellow</h1>
    <h1 class="b">Brown</h1>
</body>
</html>
